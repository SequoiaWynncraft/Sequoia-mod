name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release jar
        run: ./gradlew clean build remapJar --stacktrace -Pbackend_environment=production

      - name: Generate SHA-256 files
        shell: bash
        run: |
          set -euo pipefail
          for file in build/libs/*.jar; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/libs/*.jar
            build/libs/*.jar.sha256
